<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <title>Mini Pokédex</title>
</head>

<body>
    <header>
        <img src="img/icon.png" alt="">
        <h1>Mini Pokédex</h1>
    </header>

    <main>
        <div id="form">
            <img src="img/pokedex.webp" alt="" class="pokedexImg">
            <h3>Ingresa el nombre de un Pokémon:</h3>
            <div class="search-box">
                <input type="text" id="inputBuscar" placeholder="Ej: pikachu">
                <button id="botonBuscar" onclick="buscador()">Buscar</button>
            </div>
            <p id="loading" style="display:none">Cargando...</p>
            <p id="error" style="display:none"></p>
        </div>
        <div id="resultado"></div>
    </main>

    <footer>Copyright &copy; 2026 - Kracodriguez</footer>
    <script src="script.js"></script>
</body>

</html>
